  <style>
:root {
  --bg: #f5f7fb;
  --surface: #ffffff;
  --surface-2: #f8fafc;
  --ink: #101827;
  --muted: #64748b;
  --line: #e2e8f0;
  --primary: #2563eb;
  --primary-soft: #dbeafe;
  --primary-ink: #ffffff;
  --danger: #dc2626;
  --danger-soft: #fee2e2;
  --success: #15803d;
  --success-soft: #dcfce7;
  --warning: #b45309;
  --warning-soft: #fef3c7;
  --chip: #eef2ff;
  --shadow: 0 18px 50px rgba(15, 23, 42, .08);
  --radius: 20px;
  color-scheme: light;
}

html[data-theme="dark"] {
  --bg: #0b1220;
  --surface: #111827;
  --surface-2: #0f172a;
  --ink: #e5e7eb;
  --muted: #94a3b8;
  --line: #263244;
  --primary: #60a5fa;
  --primary-soft: #172554;
  --primary-ink: #07111f;
  --danger: #f87171;
  --danger-soft: #3f1d22;
  --success: #4ade80;
  --success-soft: #12301d;
  --warning: #fbbf24;
  --warning-soft: #3b2b0d;
  --chip: #18233a;
  --shadow: 0 18px 50px rgba(0, 0, 0, .28);
  color-scheme: dark;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
}

body { padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
button, input, select, textarea { font: inherit; }
button { border: 0; cursor: pointer; }
button:disabled { opacity: .5; cursor: not-allowed; }

#app-shell {
  width: min(100%, 540px);
  min-height: 100vh;
  margin: 0 auto;
  position: relative;
  background: radial-gradient(circle at top right, color-mix(in srgb, var(--primary) 18%, transparent), transparent 32rem), var(--bg);
  padding-bottom: 88px;
}

.app-header {
  padding: 22px 18px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.header-actions { display:flex; gap: 8px; align-items:center; }
.eyebrow { margin: 0 0 4px; color: var(--primary); font-weight: 900; font-size: 12px; letter-spacing: .04em; line-height: 1.35; }
h1, h2, h3, p { margin-top: 0; }
h1 { margin-bottom: 0; font-size: 22px; line-height: 1.2; }
h2 { margin-bottom: 12px; font-size: 22px; }
h3 { margin-bottom: 8px; font-size: 17px; }
.view { padding: 0 14px 28px; }

.card {
  background: color-mix(in srgb, var(--surface) 96%, transparent);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  border-radius: var(--radius);
  padding: 16px;
  margin: 12px 0;
}
.card.flat { box-shadow: none; background: var(--surface-2); }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.metric { background: var(--surface-2); border: 1px solid var(--line); border-radius: 16px; padding: 12px; }
.metric .label { color: var(--muted); font-size: 12px; margin: 0 0 6px; }
.metric .value { font-size: 20px; font-weight: 900; margin: 0; }
.metric .sub { color: var(--muted); font-size: 12px; margin: 5px 0 0; }
.progress { height: 10px; background: color-mix(in srgb, var(--line) 70%, transparent); border-radius: 999px; overflow: hidden; }
.progress > span { display: block; height: 100%; width: var(--w, 0%); background: var(--primary); border-radius: inherit; transition: width .25s ease; }
.stack { display: flex; flex-direction: column; gap: 10px; }
.row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.row.wrap { flex-wrap: wrap; }
.actions { display: grid; grid-template-columns: 1fr; gap: 10px; }
.actions.two { grid-template-columns: 1fr 1fr; }
.actions.three { grid-template-columns: repeat(3, 1fr); }
.primary, .secondary, .ghost, .danger { min-height: 46px; border-radius: 15px; padding: 11px 14px; font-weight: 900; }
.primary { background: var(--primary); color: var(--primary-ink); }
.secondary { background: var(--primary-soft); color: var(--primary); }
.ghost { background: var(--surface-2); border: 1px solid var(--line); color: var(--ink); }
.danger { background: var(--danger-soft); color: var(--danger); }
.small { min-height: 34px; border-radius: 11px; padding: 7px 10px; font-size: 13px; }
.hidden { display:none !important; }
.note { color: var(--muted); font-size: 14px; line-height: 1.55; margin-bottom: 0; }
.muted { color: var(--muted); }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { display: inline-flex; align-items: center; justify-content: center; min-height: 28px; border-radius: 999px; padding: 5px 10px; background: var(--chip); color: var(--primary); font-size: 12px; font-weight: 900; border: 1px solid color-mix(in srgb, var(--primary) 18%, transparent); }
.chip.gray { color: var(--muted); background: var(--surface-2); border-color: var(--line); }
.chip.red { color: var(--danger); background: var(--danger-soft); border-color: color-mix(in srgb, var(--danger) 30%, transparent); }
.chip.green { color: var(--success); background: var(--success-soft); border-color: color-mix(in srgb, var(--success) 30%, transparent); }
.chip.yellow { color: var(--warning); background: var(--warning-soft); border-color: color-mix(in srgb, var(--warning) 30%, transparent); }
.list { display:flex; flex-direction:column; gap:10px; }
.item { border: 1px solid var(--line); background: var(--surface-2); border-radius: 16px; padding: 12px; }
.item-title { font-weight: 900; line-height: 1.35; }
.item-meta { margin-top: 5px; color: var(--muted); font-size: 12px; line-height: 1.45; }
.question-stem { font-size: 18px; line-height: 1.55; font-weight: 800; margin: 18px 0; white-space: pre-wrap; }
.choice { width:100%; text-align:left; min-height: 52px; border-radius: 16px; padding: 13px 14px; background: var(--surface-2); color: var(--ink); border: 1px solid var(--line); line-height:1.45; }
.choice.selected { border-color: var(--primary); background: var(--primary-soft); font-weight: 900; }
.choice.correct { border-color: var(--success); background: var(--success-soft); color: var(--success); }
.choice.wrong { border-color: var(--danger); background: var(--danger-soft); color: var(--danger); }
.explanation { margin-top: 8px; padding: 8px; border-radius: 12px; background: var(--surface-2); border: 1px solid var(--line); white-space: normal; line-height:1.48; }
.explanation-detailed { display: grid; gap: 7px; padding: 8px; }
.explain-section { border: 1px solid var(--line); background: color-mix(in srgb, var(--surface) 75%, var(--surface-2)); border-radius: 11px; padding: 8px 10px; }
.explain-section p { margin: 4px 0 0; color: var(--ink); line-height: 1.5; font-size: 13.5px; }
.explain-title { font-weight: 950; color: var(--primary); font-size: 13px; letter-spacing: .01em; }
.explain-section strong { color: var(--primary); }

.form { display:grid; gap: 12px; }
.field { display:grid; gap: 6px; }
.field label { color: var(--muted); font-size: 13px; font-weight: 800; }
input, select, textarea { width:100%; border: 1px solid var(--line); border-radius: 14px; padding: 12px; background: var(--surface-2); color: var(--ink); }
.table { width:100%; border-collapse: collapse; font-size: 13px; overflow:hidden; border-radius: 14px; }
.table th, .table td { padding: 10px 8px; border-bottom: 1px solid var(--line); text-align:left; vertical-align:top; }
.table th { color: var(--muted); font-weight: 900; }
.law-exempt { opacity:.45; }
.timer-box { position: sticky; top: 0; z-index: 3; margin-top: 0; }
.timer-text { font-size: 20px; font-weight: 950; font-variant-numeric: tabular-nums; }
.answer-grid { display:grid; grid-template-columns: repeat(10, 1fr); gap: 5px; }
.answer-dot { min-height: 28px; border-radius: 8px; background: var(--surface-2); border: 1px solid var(--line); color: var(--muted); font-size: 11px; font-weight: 800; }
.answer-dot.current { border-color: var(--primary); color: var(--primary); }
.answer-dot.answered { background: var(--primary-soft); color: var(--primary); }
.bank-card { text-align:left; display:block; width:100%; min-height: auto; }
.bank-title { font-weight: 950; margin-bottom: 4px; }
.bank-desc { color: var(--muted); font-size: 12px; line-height: 1.45; }
.tabbar { position: fixed; left: 50%; bottom: 0; transform: translateX(-50%); width: min(100%, 540px); display:grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 8px 10px calc(8px + env(safe-area-inset-bottom)); background: color-mix(in srgb, var(--surface) 94%, transparent); border-top: 1px solid var(--line); backdrop-filter: blur(14px); }

.explain-section.emphasis { border-color: var(--primary); background: var(--primary-soft); }
.explain-list { margin: 5px 0 0; padding-left: 18px; line-height: 1.5; font-size: 13.5px; }

.choice-analysis .chip { width: fit-content; }


.timer-toggle {
  min-width: 94px;
  font-variant-numeric: tabular-nums;
  letter-spacing: .01em;

.timer-reset {
  min-width: 58px;
  padding-left: 9px;
  padding-right: 9px;

.timer-toggle.timer-running {
  background: var(--primary);
  color: var(--primary-ink);
  border-color: var(--primary);
}
.timer-toggle.timer-paused {
  color: var(--warning);
  background: var(--warning-soft);
  border-color: color-mix(in srgb, var(--warning) 30%, transparent);

.timer-note { margin-top: 4px; font-size: 12px; }
.hint-actions { display: flex; justify-content: flex-end; margin: -6px 0 10px; }
.hint-box {

  padding: 12px;
  margin: 0 0 12px;
  line-height: 1.58;
}
.hint-title {

  color: var(--primary);
  margin-bottom: 6px;
}
.hint-box p { margin: 6px 0 0; color: var(--ink); font-size: 14px; }
@media (max-width: 430px) {
  .app-header { align-items: flex-start; }
  .header-actions { flex-wrap: wrap; justify-content: flex-end; max-width: 190px; }
  .timer-toggle { min-width: 100px; }
  .timer-reset { min-width: 58px; }
}


.review-list { display: grid; gap: 8px; }
.review-item {
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--surface-2);
  overflow: hidden;

.review-item.correct { border-color: color-mix(in srgb, var(--success) 26%, var(--line)); }
.review-item.wrong { border-color: color-mix(in srgb, var(--danger) 28%, var(--line)); }
.review-item summary {
  cursor: pointer;
  list-style: none;
  padding: 10px 11px;
}
.review-item summary::-webkit-details-marker { display: none; }
.review-summary-main { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; line-height: 1.35; }
.review-summary-meta { margin-top: 4px; color: var(--muted); font-size: 12px; line-height: 1.35; }
.review-body { padding: 0 10px 10px; cursor: pointer; }
.review-choice-summary { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 8px; }
.review-choices .choice { cursor: default; }

.review-body .question-stem { margin: 10px 0; font-size: 16px; line-height: 1.45; }
.review-body .stack { gap: 6px; }
.review-body .choice { min-height: auto; padding: 9px 10px; border-radius: 11px; line-height: 1.38; }
.review-body .explanation { margin-top: 8px; }
.review-body .explain-title { font-size: 12.5px; }
.review-body .chip { min-height: 24px; padding: 3px 8px; }

  let state = loadState();
  const ui = {
    tab: 'home',
    session: null,
    deferredInstallPrompt: null,
    toastTimer: null,
    timer: {
      limitSeconds: 120 * 60,
      remainingSeconds: 120 * 60,
      running: false,
      lastTickAt: null
    }
  };

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    applyTheme();
    bindGlobalEvents();
    render();
    registerServiceWorker();
    updateHeaderTimerDom();
    window.setInterval(tickTimers, 1000);
  }

  function bindGlobalEvents() {
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        ui.tab = tab.dataset.tab;
        render();
      });
    });

    document.body.addEventListener('click', event => {
      const reviewBody = event.target.closest('.review-body');
      if (reviewBody) {
        const reviewItem = reviewBody.closest('details.review-item[open]');
        if (reviewItem) {
          event.preventDefault();
          reviewItem.open = false;
          reviewItem.querySelector('summary')?.scrollIntoView({ block: 'nearest' });
        }
        return;
      }

      const target = event.target.closest('[data-action]');
      if (!target) return;
      handleAction(target.dataset.action, target, event);
    });

    document.body.addEventListener('change', event => {
      if (event.target?.id === 'importFile') importJson(event.target.files?.[0]);
    });

    window.addEventListener('beforeinstallprompt', event => {
      event.preventDefault();
      ui.deferredInstallPrompt = event;
      document.getElementById('installBtn')?.classList.remove('hidden');
    });

    document.getElementById('installBtn')?.addEventListener('click', async () => {
      if (!ui.deferredInstallPrompt) return;
      ui.deferredInstallPrompt.prompt();
      await ui.deferredInstallPrompt.userChoice;
      ui.deferredInstallPrompt = null;
      document.getElementById('installBtn')?.classList.add('hidden');
    });
  }

  function handleAction(action, target, event) {
    switch (action) {
      case 'toggle-theme':
        toggleTheme();
        break;
      case 'toggle-app-timer':
        toggleAppTimer();
        break;
      case 'reset-app-timer':
        resetAppTimer();
        break;
      case 'go':
        ui.tab = target.dataset.tabTarget;
        render();
        break;
      case 'start-practice':
        startPractice(target.dataset.mode || 'random', Number(target.dataset.count || 10), target.dataset.bank || '');
        break;
      case 'start-subject-practice':
        startSubjectPractice();
        break;
      case 'start-mock':
        startMockExam(target.dataset.bank || 'RANDOM');
        break;
      case 'select-choice':
        selectChoice(Number(target.dataset.index));
        break;
      case 'reveal-practice-answer':
        revealPracticeAnswer();
        break;
      case 'toggle-hint':
        togglePracticeHint();
        break;
      case 'next-practice-question':
        nextPracticeQuestion();
        break;
      case 'mock-next':
        moveMock(1);
        break;
      case 'mock-prev':
        moveMock(-1);
        break;
      case 'mock-jump':
        jumpMock(Number(target.dataset.index));
        break;
      case 'finish-mock':
        finishMockExam(false);
        break;
      case 'quit-session':
        quitSession();
        break;
      case 'record-reason':
        recordMistakeReason(target.dataset.reason);
        break;
      case 'save-settings':
        event.preventDefault();
        saveSettings();
        break;
      case 'export-json':
        exportJson();
        break;
      case 'pick-import-file':
        document.getElementById('importFile')?.click();
        break;
      case 'clear-attempts':
        clearAttempts();
        break;
      case 'reset-all':
        resetAll();
        break;
      case 'load-bank':
        loadBankAgain();
        break;
      default:
        break;
    }
  }

  function render() {
    document.querySelectorAll('.tab').forEach(tab => tab.classList.toggle('active', tab.dataset.tab === ui.tab));
    applyTheme();
    updateHeaderTimerDom();

    if (ui.tab === 'home') return renderHome();
    if (ui.tab === 'quiz') return renderQuiz();
    if (ui.tab === 'wrong') return renderWrong();
    if (ui.tab === 'mock') return renderMock();
    if (ui.tab === 'settings') return renderSettings();
  }

        <div class="metric"><p class="label">복습 대기</p><p class="value">${due.length}</p><p class="sub">오답·느린 정답</p></div>
        <div class="metric"><p class="label">문제은행</p><p class="value">${state.questions.length}</p><p class="sub">A~H ${bankStats.seededTotal}문항</p></div>
        <div class="metric"><p class="label">누적 풀이</p><p class="value">${state.attempts.length}</p><p class="sub">정답 ${stats.correctCount}회</p></div>

      <section class="card">

      <section class="card">

            <button class="ghost bank-card" data-action="start-practice" data-mode="bank" data-bank="${b.id}" data-count="10" type="button">
              <div class="bank-title">${esc(b.label)} · ${esc(b.title)}</div>

        ${weak.length ? `<div class="list">${weak.map(w => `<div class="item"><div class="item-title">${esc(w.topic)}</div><div class="item-meta">${esc(w.subject)} &gt; ${esc(w.subSubject)} · 오답 ${w.wrong}회 · 정답률 ${w.rate}%</div></div>`).join('')}</div>` : '<p class="note">아직 취약 태그가 없습니다. 문제를 몇 개 풀면 자동으로 집계됩니다.</p>'}
      </section>

      <section class="card">
        <h3>최근 모의고사</h3>
        ${latestMock ? renderMockSummary(latestMock) : '<p class="note">아직 모의고사 기록이 없습니다.</p>'}
      </section>
    `);
  }

  function renderQuiz() {
    if (ui.session?.kind === 'practice') return renderPracticeSession();
    if (ui.session?.kind === 'practiceResult') return renderPracticeResult();

    const subjects = unique(getActiveQuestions().map(q => q.subject));
    setView(`
      <section class="card">
        <p class="eyebrow">랜덤 문제 기능</p>
        <h2>문제 풀기</h2>
        <p class="note">문제 입력 모드는 제거했습니다. 이제 A~H 문제은행, 랜덤 풀이, 오답 복습, 실전 모의고사만 사용합니다.</p>
        <div class="actions two" style="margin-top:12px;">
          <button class="primary" data-action="start-practice" data-mode="today" data-count="10" type="button">추천 10문제</button>
          <button class="secondary" data-action="start-practice" data-mode="due" data-count="20" type="button">오답 복습</button>
          <button class="ghost" data-action="start-practice" data-mode="random" data-count="5" type="button">랜덤 5문제</button>
          <button class="ghost" data-action="start-practice" data-mode="random" data-count="10" type="button">랜덤 10문제</button>
          <button class="ghost" data-action="start-practice" data-mode="random" data-count="20" type="button">랜덤 20문제</button>
          <button class="ghost" data-action="start-practice" data-mode="random" data-count="50" type="button">랜덤 50문제</button>
        </div>
      </section>

      <section class="card">
        <h3>A~H 유형별 랜덤</h3>
        <div class="grid2">
          ${BANK_TYPES.filter(b => b.id !== 'RANDOM').map(b => `
            <button class="ghost bank-card" data-action="start-practice" data-mode="bank" data-bank="${b.id}" data-count="15" type="button">
              <div class="bank-title">${esc(b.label)} · 15문제</div>
              <div class="bank-desc">${esc(b.title)}</div>
            </button>
          `).join('')}
        </div>
      </section>

      <section class="card">
        <h3>과목별 풀기</h3>
        <div class="form">
          <div class="field"><label for="subjectSelect">과목</label><select id="subjectSelect">${subjects.map(s => `<option value="${escAttr(s)}">${esc(s)}</option>`).join('')}</select></div>
          <div class="field"><label for="subjectCount">문제 수</label><select id="subjectCount"><option value="5">5문제</option><option value="10" selected>10문제</option><option value="20">20문제</option><option value="30">30문제</option></select></div>
          <button class="primary" data-action="start-subject-practice" type="button">선택 과목 랜덤 시작</button>
        </div>
      </section>
    `);
  }

  function renderPracticeSession() {
    const s = ui.session;
    if (s.finished) return renderPracticeResult();
    const question = getQuestion(s.questionIds[s.index]);
    if (!question) { ui.session = null; return renderQuiz(); }
    const elapsed = Math.floor((Date.now() - s.currentStartedAt) / 1000);
    const selected = s.selected;
    const revealed = s.revealed;
    const isCorrect = revealed && selected === question.answer;
    const hintVisible = !!s.hintVisible;

    setView(`
      <section class="card quiz-card">
        <div class="row wrap">
          <span class="chip ${question.priority === 'A+' ? 'red' : question.priority === 'A' ? '' : 'gray'}">${esc(question.bankLabel || question.bankTypes?.[0] || '문제')} · ${esc(question.priority)} · ${esc(question.questionType)}</span>
          <span class="chip gray">${s.index + 1}/${s.questionIds.length} · ${elapsed}초</span>
        </div>
        <p class="note" style="margin:12px 0 0;">${esc(question.subject)} &gt; ${esc(question.subSubject)} &gt; ${esc(question.topic)}</p>
        <div class="question-stem">${esc(question.questionText)}</div>
        <div class="hint-actions">
          <button class="ghost small" data-action="toggle-hint" type="button">${hintVisible ? '힌트 숨기기' : '힌트 보기'}</button>
        </div>
        ${hintVisible ? renderQuestionHint(question) : ''}
        <div class="stack">
          ${question.choices.map((choice, idx) => {
            const classes = ['choice'];
            if (selected === idx) classes.push('selected');
            if (revealed && idx === question.answer) classes.push('correct');
            if (revealed && selected === idx && selected !== question.answer) classes.push('wrong');
            return `<button class="${classes.join(' ')}" data-action="select-choice" data-index="${idx}" type="button" ${revealed ? 'disabled' : ''}>${idx + 1}. ${esc(choice)}</button>`;
          }).join('')}
        </div>

        ${revealed ? `
          <div class="card flat" style="margin:14px 0 0;">
            <div class="row wrap"><strong>${isCorrect ? '정답입니다.' : '오답입니다.'}</strong><span class="chip ${isCorrect ? 'green' : 'red'}">정답 ${question.answer + 1}번</span></div>
            ${renderDetailedExplanation(question, selected)}
            ${!isCorrect ? `<p class="note" style="margin:12px 0 8px;">오답 사유를 고르면 복습 우선순위가 더 정확해집니다.</p><div class="chips">${['개념 모름','계산 실수','공식 혼동','지문 오독','시간 부족','찍음'].map(r => `<button class="chip gray" data-action="record-reason" data-reason="${escAttr(r)}" type="button">${esc(r)}</button>`).join('')}</div>` : ''}
          </div>
        ` : ''}

        <div class="actions two" style="margin-top:14px;">
          <button class="ghost" data-action="quit-session" type="button">중단</button>
          ${revealed ? `<button class="primary" data-action="next-practice-question" type="button">${s.index + 1 === s.questionIds.length ? '결과 보기' : '다음 문제'}</button>` : `<button class="primary" data-action="reveal-practice-answer" type="button" ${selected === null ? 'disabled' : ''}>정답 확인</button>`}
        </div>
      </section>
    `);
  }


  function renderQuestionHint(question) {
    const formula = getFormulaGuide(question);
    const approach = getApproachGuide(question);
    const text = `${question.questionType} ${question.topic} ${question.pattern} ${question.questionText}`;
    const focus = /calculation|계산|%|원|배|가격|수익률|비율|가치/.test(text)
      ? '숫자를 바로 계산하기 전에 부호, 단위(%와 %p), 분자·분모를 먼저 확정하세요.'
      : /law|법|윤리|규정|투자권유|불공정|회사법/.test(text)
        ? '행위 주체, 금지·의무·예외, 투자자 보호 취지를 순서대로 확인하세요.'
        : '문제의 핵심 키워드와 선택지의 방향성이 같은지 먼저 비교하세요.';
    return `
      <div class="hint-box" role="note">
        <div class="hint-title">힌트</div>
        <p>${esc(focus)}</p>
        <p>${esc(formula)}</p>
        <p>${esc(approach)}</p>
      </div>
    `;
  }


  function renderDetailedExplanation(question, selectedIndex = null) {
    const correctChoice = question.choices?.[question.answer] ?? '';
    const selectedChoice = selectedIndex === null || selectedIndex === undefined ? '' : (question.choices?.[selectedIndex] ?? '');
    const isWrong = selectedIndex !== null && selectedIndex !== undefined && selectedIndex !== question.answer;
    const concept = getConceptGuide(question);
    const formula = getFormulaGuide(question);
    const approach = getApproachGuide(question);
    const trap = getTrapGuide(question, selectedChoice, isWrong);
    const examTip = getExamTimeTip(question);
    const tip = getMemoryTip(question);
    const choiceAnalysis = renderChoiceAnalysis(question, selectedIndex);
    return `
      <div class="explanation explanation-detailed">
        <div class="explain-section emphasis">
          <div class="explain-title">정답 요약</div>
          <p>정답은 <strong>${question.answer + 1}번</strong> “${esc(correctChoice)}”입니다. ${selectedIndex === null || selectedIndex === undefined ? '' : `내 선택은 ${selectedIndex + 1}번 “${esc(selectedChoice)}”입니다.`}</p>
        </div>
        <div class="explain-section">
          <div class="explain-title">1. 핵심개념</div>
          <p>${esc(concept)}</p>
        </div>
        <div class="explain-section">
          <div class="explain-title">2. 사용 공식 / 판단 기준</div>
          <p>${esc(formula)}</p>
        </div>
        <div class="explain-section">
          <div class="explain-title">3. 실제 풀이과정</div>
          <p>${esc(question.explanation || '이 문항은 정답 선택지의 개념·공식·요건을 확인하는 문제입니다.')}</p>
          <p>${esc(approach)}</p>
        </div>
        <div class="explain-section">
          <div class="explain-title">4. 보기별 판별</div>
          <ul class="choice-analysis">${choiceAnalysis}</ul>
        </div>
        <div class="explain-section">
          <div class="explain-title">5. 오답 포인트</div>
          <p>${esc(trap)}</p>
        </div>
        <div class="explain-section">
          <div class="explain-title">6. 시험장 시간단축 팁</div>
          <p>${esc(examTip)}</p>
        </div>
        <div class="explain-section">
          <div class="explain-title">7. 암기팁</div>
          <p>${esc(tip)}</p>
        </div>
      </div>
    `;
  }

  function getFormulaGuide(question) {
    const text = `${question.subject} ${question.subSubject} ${question.topic} ${question.pattern} ${question.questionText}`;
    if (/듀레이션/.test(text)) return '채권가격변동률 ≈ -수정듀레이션 × 금리변화폭입니다. 금리변화폭은 0.5%p라면 0.005처럼 소수로 바꿔 대입합니다.';
    if (/볼록성/.test(text)) return '볼록성은 듀레이션으로 계산한 1차 가격변동 추정치를 보정하는 개념입니다. 일반적인 채권의 양의 볼록성은 투자자에게 유리한 곡률 효과를 줍니다.';
    if (/WACC|부채비용|자기자본비용|가중평균자본비용/.test(text)) return 'WACC = E/V×Re + D/V×Rd×(1-T)입니다. 자기자본비용은 그대로, 부채비용은 세후부채비용으로 반영하는 것이 핵심입니다.';
    if (/CAPM|요구수익률|베타|시장위험프리미엄/.test(text)) return '요구수익률 = 무위험수익률 + β×시장위험프리미엄입니다. 시장위험프리미엄이 이미 주어졌다면 시장수익률에서 무위험수익률을 다시 빼지 않습니다.';
    if (/NPV|순현재가치/.test(text)) return 'NPV = 현금유입의 현재가치 - 초기투자액입니다. NPV가 양수이면 요구수익률을 초과하는 가치창출 가능성이 있습니다.';
    if (/IRR|내부수익률/.test(text)) return 'IRR은 NPV를 0으로 만드는 할인율입니다. 일반적인 독립 투자안에서는 IRR이 자본비용보다 높으면 채택 가능성이 있습니다.';
    if (/PER/.test(text)) return 'PER 방식의 적정주가 = EPS × PER입니다. EPS와 PER의 짝을 맞추는 것이 핵심입니다.';
    if (/PBR/.test(text)) return 'PBR 방식의 적정주가 = BPS × PBR입니다. 장부가치 기준의 주가배수라는 점을 확인합니다.';
    if (/EV\/EBITDA|EV/.test(text)) return 'EV = EBITDA × EV/EBITDA 배수입니다. EV는 기업 전체 가치이므로 주식가치와 혼동하지 않아야 합니다.';
    if (/배당할인|DDM|D1|k-g/.test(text)) return '고든 성장모형은 P0 = D1/(k-g)입니다. D0와 D1, 요구수익률 k와 성장률 g를 구분합니다.';
    if (/채권가격|현재수익률|만기수익률|수익률곡선|시장금리|표면이율/.test(text)) return '채권가격은 미래 쿠폰과 원금을 시장수익률로 할인한 현재가치입니다. 금리와 채권가격은 일반적으로 반대로 움직입니다.';
    if (/선물|베이시스|헤지|스프레드/.test(text)) return '베이시스는 통상 현물가격-선물가격으로 계산합니다. 선물 손익은 포지션 방향과 진입가격·청산가격의 차이를 계약승수와 연결해 계산합니다.';
    if (/옵션|풋|콜|패리티|내재가치|손익/.test(text)) return '콜 내재가치 = max(S-K,0), 풋 내재가치 = max(K-S,0), 풋-콜 패리티는 C+PV(K)=P+S입니다.';
    if (/DCF|FCFF|FCFE|기업가치|터미널가치/.test(text)) return '영구성장 DCF는 가치 = 다음 기 현금흐름/(할인율-성장률)입니다. 기업가치와 자기자본가치의 조정 여부를 확인합니다.';
    if (/유동비율|부채비율|ROE|ROA|이자보상배율|재무비율/.test(text)) return '재무비율은 분자와 분모가 핵심입니다. 유동비율=유동자산/유동부채, 부채비율=총부채/자기자본, ROE=순이익/자기자본입니다.';
    if (/현금흐름|영업활동|투자활동|재무활동|FCF/.test(text)) return '현금흐름은 영업·투자·재무활동으로 구분합니다. 단순 FCF는 영업현금흐름에서 설비투자 등 필수 투자지출을 차감해 봅니다.';
    if (/법|규정|윤리|불공정|투자권유|적합성|적정성|설명의무|이해상충|조사분석|회사법|자본시장법/.test(text)) return '법규·윤리 문제는 “누가, 누구에게, 어떤 상황에서, 무엇을 해야 하거나 하지 말아야 하는가”를 기준으로 판단합니다.';
    if (/분산|표준편차|공분산|상관계수|회귀|R²|계량/.test(text)) return '계량 문제는 평균, 편차, 분산, 상관관계, 회귀계수의 의미를 구분합니다. 계산형이면 먼저 평균 또는 기준값을 구한 뒤 편차를 처리합니다.';
    if (/환율|금리|통화정책|인플레이션|경기|수익률곡선/.test(text)) return '경제 문제는 변수의 방향성을 연결합니다. 금리, 환율, 물가, 경기, 주가, 채권가격이 어떤 경로로 움직이는지 확인합니다.';
    return '이 유형은 문제의 핵심 용어와 조건을 정의에 대입해 판단합니다. 숫자가 있으면 단위와 부호를, 개념형이면 예외 문구와 단정 표현을 확인합니다.';
  }

  function renderChoiceAnalysis(question, selectedIndex = null) {
    return (question.choices || []).map((choice, idx) => {
      const isCorrect = idx === question.answer;
      const isSelected = idx === selectedIndex;
      const label = isCorrect ? '정답' : (isSelected ? '내 선택' : '오답');
      const cls = isCorrect ? 'green' : (isSelected ? 'red' : 'gray');
      const reason = isCorrect
        ? '문제 조건을 공식·개념에 적용했을 때 결론과 일치합니다. 이 보기를 고른 뒤에도 단위, 부호, 예외 표현을 한 번 더 확인하면 안정적입니다.'
        : getChoiceTrapReason(question, isSelected);
      return `<li><span class="chip ${cls}">${idx + 1}번 · ${label}</span><span>${esc(choice)} — ${esc(reason)}</span></li>`;
    }).join('');
  }

  function getChoiceTrapReason(question, isSelected) {
    const text = `${question.topic} ${question.pattern} ${question.questionText}`;
    const prefix = isSelected ? '이 보기는 내가 고른 답이지만, ' : '';
    if (/듀레이션|채권|금리/.test(text)) return prefix + '금리와 가격의 반대 방향, %p의 소수 변환, 수정듀레이션 적용 중 하나가 어긋났을 가능성이 큽니다.';
    if (/WACC|부채비용/.test(text)) return prefix + '세전·세후 부채비용 또는 자본구조 비중을 반대로 적용했을 가능성이 있습니다.';
    if (/CAPM|베타/.test(text)) return prefix + '무위험수익률을 빠뜨리거나 시장위험프리미엄 대신 시장수익률 전체를 사용했을 가능성이 있습니다.';
    if (/옵션|선물|베이시스|패리티/.test(text)) return prefix + '매수/매도, 콜/풋, 현물/선물의 방향을 바꾼 함정일 수 있습니다.';
    if (/PER|PBR|EV|DCF|FCFF|FCFE/.test(text)) return prefix + '지표의 적용 대상이 다릅니다. 주가, 기업가치, 자기자본가치 중 무엇을 묻는지 다시 봐야 합니다.';
    if (/법|윤리|불공정|투자권유|이해상충|조사분석/.test(text)) return prefix + '규제 취지와 다른 단정 표현, 금지/허용의 뒤바뀜, 설명·고지 의무의 누락이 숨어 있을 수 있습니다.';
    return prefix + '문제의 핵심 조건 중 하나를 바꿨거나, 정의의 범위를 지나치게 넓히거나 좁힌 선택지입니다.';
  }

  function getExamTimeTip(question) {
    const text = `${question.questionType} ${question.topic} ${question.pattern} ${question.questionText}`;
    if (/calculation|계산|%|원|배|수익률|비율|가치|가격/.test(text)) return '계산형은 처음부터 긴 계산을 하지 말고, 먼저 답의 방향과 대략적인 크기를 잡으세요. 그 다음 선택지 간격을 보고 필요한 자리수까지만 계산하면 시간을 줄일 수 있습니다.';
    if (/law|법|윤리|규정|투자권유|불공정|회사법/.test(text)) return '법규형은 선택지에서 “항상, 절대, 보장, 전혀” 같은 단정어를 먼저 표시하세요. 투자자 보호와 시장 공정성에 정면으로 어긋나는 보기는 빠르게 제거할 수 있습니다.';
    return '개념형은 보기 전체를 읽기 전에 문제의 핵심 키워드를 하나 정하세요. 그 키워드와 직접 충돌하는 선택지를 먼저 지우면 풀이 시간이 짧아집니다.';
  }

  function getConceptGuide(question) {
    const text = `${question.subject} ${question.subSubject} ${question.topic} ${question.pattern} ${question.questionText}`;
    if (/듀레이션/.test(text)) return '듀레이션은 금리 변화에 대한 채권가격 민감도를 나타냅니다. 특히 수정듀레이션은 가격변동률을 바로 근사할 때 사용하며, 금리 상승은 가격 하락, 금리 하락은 가격 상승으로 연결됩니다.';
    if (/볼록성/.test(text)) return '볼록성은 듀레이션의 선형 근사가 놓치는 곡률 효과를 보정합니다. 일반적인 채권의 양의 볼록성은 금리 하락 시 가격 상승을 더 크게, 금리 상승 시 가격 하락을 덜 크게 만드는 방향으로 작용합니다.';
    if (/WACC|부채비용|자기자본비용|가중평균자본비용/.test(text)) return 'WACC는 자기자본비용과 세후부채비용을 자본구성 비율로 가중평균한 할인율입니다. 부채비용에는 법인세 절감효과가 반영되므로 보통 Rd×(1-T)를 사용합니다.';
    if (/CAPM|요구수익률|베타|시장위험프리미엄/.test(text)) return 'CAPM은 개별자산의 요구수익률을 무위험수익률, 베타, 시장위험프리미엄으로 설명합니다. 베타가 클수록 시장 위험에 더 민감하므로 요구수익률도 커집니다.';
    if (/NPV|순현재가치/.test(text)) return 'NPV는 미래 현금흐름의 현재가치에서 초기투자액을 차감한 값입니다. NPV가 0보다 크면 요구수익률을 넘는 가치 창출 가능성이 있다는 뜻으로 해석합니다.';
    if (/IRR|내부수익률/.test(text)) return 'IRR은 NPV를 0으로 만드는 할인율입니다. 일반적인 독립 투자안에서는 IRR이 요구수익률보다 높으면 채택 가능성이 커집니다.';
    if (/PER|PBR|EV\/EBITDA|주가배수|상대가치/.test(text)) return '상대가치평가는 EPS, BPS, EBITDA 같은 기준 지표에 적정 배수를 곱해 주가나 기업가치를 추정하는 방식입니다. 배수의 의미와 적용 대상이 서로 다릅니다.';
    if (/DCF|FCFF|FCFE|기업가치|터미널가치/.test(text)) return 'DCF는 미래 현금흐름을 적절한 할인율로 현재가치화해 기업가치를 구합니다. FCFF는 기업 전체 현금흐름, FCFE는 주주에게 귀속되는 현금흐름이라는 차이가 있습니다.';
    if (/채권가격|현재수익률|만기수익률|수익률곡선|시장금리|표면이율/.test(text)) return '채권가격은 미래 쿠폰과 원금을 시장수익률로 할인한 현재가치입니다. 시장금리가 상승하면 할인율이 높아져 기존 채권가격은 하락합니다.';
    if (/선물|베이시스|헤지|스프레드/.test(text)) return '선물 문제는 현물가격과 선물가격의 관계, 포지션 방향, 헤지 목적을 먼저 구분해야 합니다. 베이시스 정의를 문제에서 어떤 방향으로 쓰는지도 확인해야 합니다.';
    if (/옵션|풋|콜|패리티|내재가치|손익/.test(text)) return '옵션 문제는 콜/풋, 매수/매도, 행사가격, 프리미엄을 분리해서 봐야 합니다. 내재가치는 만기 시점의 권리행사 이익이고, 순손익은 여기서 프리미엄을 반영한 값입니다.';
    if (/ELS|ELW|파생결합|기어링|델타|녹인|낙인/.test(text)) return '파생결합증권과 ELW는 기초자산 가격 변동에 따라 수익·손실 구조가 달라집니다. 조건부 상환, 손실 배리어, 레버리지 지표의 의미를 구분해야 합니다.';
    if (/유동비율|부채비율|ROE|ROA|이자보상배율|재무비율/.test(text)) return '재무비율은 분자와 분모를 정확히 기억하는 것이 핵심입니다. 안정성, 수익성, 활동성, 성장성 중 어떤 목적의 지표인지 함께 판단해야 합니다.';
    if (/현금흐름|영업활동|투자활동|재무활동/.test(text)) return '현금흐름표는 발생주의 손익이 아니라 현금 유입·유출을 활동별로 나눠 보여줍니다. 본업 관련 현금흐름은 영업활동, 설비투자 등은 투자활동, 차입·상환·배당은 재무활동으로 봅니다.';
    if (/금융투자상품|자본시장법|파생상품|투자성|원본손실|불공정|미공개|시세조종|투자권유|적합성|적정성|설명의무/.test(text)) return '법규 문제는 조문을 통째로 암기하기보다 요건과 규제 취지를 분리해 판단해야 합니다. 투자자 보호, 시장 공정성, 이해상충 방지가 반복되는 핵심 축입니다.';
    if (/회사법|주주총회|이사회|의결권|배당|감사|이사/.test(text)) return '회사법 문제는 기관별 권한과 절차를 구분해야 합니다. 주주총회는 주주의 의사결정, 이사회는 업무집행 의사결정과 감독, 이사는 선관주의·충실의무와 연결됩니다.';
    if (/직무윤리|조사분석|이해상충|비공개|선행매매|투자의견|비밀/.test(text)) return '직무윤리는 정답 방향이 비교적 분명합니다. 분석의 독립성, 고객 이익 우선, 이해상충 관리, 비공개정보 이용 금지, 과장·단정 표현 금지가 핵심입니다.';
    if (/분산|표준편차|공분산|상관계수|회귀|R²|계량/.test(text)) return '계량분석은 공식 자체보다 지표가 뜻하는 바를 함께 이해해야 합니다. 분산·표준편차는 위험 크기, 공분산·상관계수는 함께 움직이는 정도, 회귀계수는 민감도를 나타냅니다.';
    if (/환율|금리|통화정책|인플레이션|경기|수익률곡선/.test(text)) return '증권경제 문제는 경제 변수의 방향성을 묻는 경우가 많습니다. 금리, 환율, 물가, 경기, 주가가 서로 어떤 방향으로 영향을 주는지 연결해서 판단합니다.';
    return `${question.topic} 유형은 ${question.subSubject}에서 반복 출제될 수 있는 기본 판단 문제입니다. 문제의 키워드, 공식, 요건, 예외를 분리해서 확인하는 것이 중요합니다.`;
  }

  function getApproachGuide(question) {
    const text = `${question.questionType} ${question.topic} ${question.pattern} ${question.questionText}`;
    if (/calculation|계산|%|원|배|현재가치|수익률|비율/.test(text)) {
      return '계산형은 ① 필요한 공식 확인 → ② 문제 숫자 대입 → ③ 단위 변환(%p, %, 원, 배) → ④ 선택지와 반올림 기준 비교 순서로 풀면 실수가 줄어듭니다.';
    }
    if (/law|법|윤리|규정|투자권유|불공정/.test(text)) {
      return '법규·윤리형은 ① 행위 주체 확인 → ② 투자자 보호 또는 시장질서 훼손 여부 확인 → ③ 금지·의무·예외 중 무엇을 묻는지 확인하는 순서로 판단합니다.';
    }
    return '개념형은 지문에서 절대 표현, 방향성 표현, 비교 기준을 먼저 표시한 뒤 선택지마다 핵심 키워드가 문제의 정의와 일치하는지 확인합니다.';
  }

  function getTrapGuide(question, selectedChoice, isWrong) {
    const text = `${question.topic} ${question.pattern} ${question.questionText}`;
    const selectedPart = isWrong && selectedChoice ? `내가 고른 “${selectedChoice}”는 조건 중 일부만 맞거나 방향·단위·정의가 어긋난 선택지일 가능성이 큽니다. ` : '';
    if (/듀레이션|채권|금리/.test(text)) return selectedPart + '채권 문제의 대표 함정은 금리와 가격의 방향을 반대로 보지 않는 것, %와 %p를 혼동하는 것, 수정듀레이션과 매컬리듀레이션을 섞는 것입니다.';
    if (/WACC|부채비용/.test(text)) return selectedPart + 'WACC에서는 부채비용에 세금효과를 반영하는지, 자기자본비율과 부채비율의 합이 100%인지, 세전·세후 값을 혼동하지 않았는지 확인해야 합니다.';
    if (/CAPM|베타/.test(text)) return selectedPart + 'CAPM에서는 시장수익률 전체를 곱하는 것이 아니라 시장위험프리미엄에 베타를 곱한 뒤 무위험수익률을 더해야 합니다.';
    if (/옵션|선물|베이시스|패리티/.test(text)) return selectedPart + '파생상품에서는 매수/매도 방향, 콜/풋 구분, 프리미엄 차감 여부, 베이시스 정의 방향을 바꾸면 답이 쉽게 달라집니다.';
    if (/PER|PBR|EV|DCF|FCFF|FCFE/.test(text)) return selectedPart + '가치평가에서는 주가와 기업가치, 자기자본가치와 영업가치, EPS와 EBITDA처럼 적용 대상이 다른 지표를 섞는 것이 대표 오답 원인입니다.';
    if (/법|윤리|불공정|투자권유|이해상충|조사분석/.test(text)) return selectedPart + '법규·윤리 문항은 “항상”, “절대”, “보장” 같은 단정 표현과 투자자 보호 취지에 어긋나는 표현이 함정으로 자주 등장합니다.';
    if (/재무비율|유동비율|부채비율|ROE|현금흐름/.test(text)) return selectedPart + '재무분석에서는 분자·분모를 뒤집거나 평균잔액과 기말잔액을 구분하지 않는 실수가 많습니다.';
    return selectedPart + '오답 선택지는 대개 키워드 하나는 맞지만 방향, 조건, 단위, 적용 대상 중 하나가 틀립니다. 다음에 풀 때는 선택지를 지우기 전에 문제의 핵심 조건을 먼저 표시하세요.';
  }

  function getMemoryTip(question) {
    const text = `${question.topic} ${question.pattern} ${question.questionText}`;
    if (/듀레이션/.test(text)) return '듀레이션은 “금리 ↑ → 가격 ↓” 부호부터 잡고, 가격변동률은 -수정듀레이션×금리변화폭으로 떠올리세요.';
    if (/WACC/.test(text)) return 'WACC는 “자기자본은 세전 그대로, 부채는 세후”라고 기억하면 세금효과 실수를 줄일 수 있습니다.';
    if (/CAPM/.test(text)) return 'CAPM은 “무위험 + 베타×위험프리미엄” 한 줄로 고정해서 외우세요.';
    if (/PER/.test(text)) return 'PER 적정주가 = EPS×PER, PBR 적정주가 = BPS×PBR처럼 짝을 고정해 암기하세요.';
    if (/EV\/EBITDA|EV/.test(text)) return 'EV는 기업 전체 가치입니다. 주식가치를 구할 때는 순차입금 조정 여부를 반드시 확인하세요.';
    if (/옵션|풋|콜/.test(text)) return '콜은 살 권리, 풋은 팔 권리입니다. 매수자는 권리 보유자라 손실 한도는 프리미엄부터 생각하세요.';
    if (/선물|헤지/.test(text)) return '가격 하락 위험을 줄이려면 선물 매도헤지, 가격 상승 위험을 줄이려면 선물 매수헤지로 연결하세요.';
    if (/법|윤리|이해상충|불공정/.test(text)) return '법규·윤리는 “투자자 보호, 시장공정성, 이해상충 관리” 세 기준에 어긋나면 대체로 부적절한 선택지입니다.';
    if (/재무비율|유동비율|부채비율|ROE/.test(text)) return '비율 문제는 공식을 외운 뒤 바로 계산하지 말고, 답이 커지는 것이 좋은지 나쁜지 방향까지 같이 기억하세요.';
    return '이 유형은 문제를 다시 풀 때 공식·정의·방향성 중 무엇을 묻는지 먼저 말로 설명한 뒤 선택지를 보세요.';
  }

  function renderPracticeResult() {
    const summary = summarizeRecords(ui.session.records || []);
    setView(`
      <section class="card">
        <p class="eyebrow">문제풀이 결과</p>
        <h2>${summary.correct}/${summary.total}문항 정답 · ${summary.rate}%</h2>

  function startPractice(mode, count, bank = '') {
    const questions = selectPracticeQuestions(mode, count, bank);
    if (!questions.length) { toast('조건에 맞는 문제가 없습니다.'); return; }
    ui.session = {
      kind: 'practice', mode, bank, questionIds: questions.map(q => q.id), index: 0, selected: null, revealed: false, hintVisible: false,
      currentStartedAt: Date.now(), records: [], finished: false
    };
    ui.tab = 'quiz';
    render();
  }

  function selectPracticeQuestions(mode, count, bank = '') {
    const active = getActiveQuestions();
    let pool = active;
    if (mode === 'due') {
      const dueIds = new Set(getDueReviewItems().map(item => item.questionId));
      pool = active.filter(q => dueIds.has(q.id));
      if (!pool.length) pool = active.filter(q => q.priority === 'A+' || q.priority === 'A');
    } else if (mode === 'weak') {
      const weakKeys = new Set(getWeakTopics(8).map(w => `${w.subject}|${w.subSubject}|${w.topic}`));
      pool = active.filter(q => weakKeys.has(`${q.subject}|${q.subSubject}|${q.topic}`));
      if (!pool.length) pool = active.filter(q => q.priority === 'A+' || q.priority === 'A');
    } else if (mode === 'today') {
      const dueIds = new Set(getDueReviewItems().map(item => item.questionId));
      const due = active.filter(q => dueIds.has(q.id));
      const high = active.filter(q => q.priority === 'A+' || q.priority === 'A');
      pool = [...due, ...high, ...active];
    } else if (mode === 'bank' && bank) {
      pool = active.filter(q => (q.bankTypes || []).includes(bank));
      if (!pool.length) pool = active;
    } else if (mode === 'subject') {
      // handled by startSubjectPractice
    }
    return sampleUniqueOrRepeat(pool, count);
  }

  function startSubjectPractice() {
    const subject = val('subjectSelect');
    const count = Number(val('subjectCount') || 10);
    const pool = getActiveQuestions().filter(q => q.subject === subject);
    const questions = sampleUniqueOrRepeat(pool, count);
    if (!questions.length) { toast('선택 과목에 문제가 없습니다.'); return; }
    ui.session = { kind: 'practice', mode: 'subject', bank: '', questionIds: questions.map(q => q.id), index: 0, selected: null, revealed: false, hintVisible: false, currentStartedAt: Date.now(), records: [], finished: false };
    ui.tab = 'quiz';
    render();
  }

  function selectChoice(index) {
    if (!ui.session) return;
    if (ui.session.kind === 'practice') {
      if (ui.session.revealed) return;
      ui.session.selected = index;
      render();
      return;
    }
    if (ui.session.kind === 'mock') {
      ui.session.answers[ui.session.index] = index;
      render();
    }
  }

  function togglePracticeHint() {
    const s = ui.session;
    if (!s || (s.kind !== 'practice' && s.kind !== 'mock')) return;
    s.hintVisible = !s.hintVisible;
    render();
  }


  function revealPracticeAnswer() {
    const s = ui.session;
    if (!s || s.kind !== 'practice' || s.revealed || s.selected === null) return;
    const qid = s.questionIds[s.index];
    const q = getQuestion(qid);
    const elapsed = Math.max(1, Math.floor((Date.now() - s.currentStartedAt) / 1000));
    const attempt = createAttempt(q, s.selected, elapsed, s.mode);
    state.attempts.push(attempt);
    s.records.push(attempt);
    updateReviewQueue(attempt);
    saveState();
    s.revealed = true;
    render();
  }

  function nextPracticeQuestion() {
    const s = ui.session;
    if (!s || s.kind !== 'practice') return;
    if (s.index + 1 >= s.questionIds.length) {
      s.finished = true;
      ui.session = { kind: 'practiceResult', records: s.records };
      render();
      return;
    }
    s.index += 1;
    s.selected = null;
    s.revealed = false;
    s.hintVisible = false;
    s.currentStartedAt = Date.now();
    render();
  }

  function startMockExam(bankType = 'RANDOM') {
    ui.timer.running = false;
    ui.timer.lastTickAt = null;
    const active = getActiveQuestions();
    if (!active.length) { toast('문제가 없습니다. A~H 기본 문제은행을 다시 추가해 주세요.'); return; }
    const distribution = state.settings.lawEthicsExempt ? SUBJECT_DISTRIBUTION.filter(d => !d.subject.includes('법규')) : SUBJECT_DISTRIBUTION;
    const questions = [];
    distribution.forEach(row => questions.push(...pickExamRow(active, row, bankType)));
    ui.session = {
      kind: 'mock', bankType, questionIds: questions.map(q => q.id), answers: Array(questions.length).fill(null), index: 0,
      startedAt: Date.now(), limitSeconds: Number(state.settings.mockMinutes || 120) * 60, finished: false,
      paused: false, pausedAt: null, totalPausedMs: 0, hintVisible: false,
      timeSpentSeconds: Array(questions.length).fill(0), questionEnteredAt: Date.now()
    };
    ui.tab = 'mock';
    render();
  }

  function pickExamRow(active, row, bankType) {
    const sameSub = active.filter(q => q.subject === row.subject && q.subSubject === row.subSubject);
    const sameSubject = active.filter(q => q.subject === row.subject);
    const primary = bankType === 'RANDOM' ? sameSub : sameSub.filter(q => (q.bankTypes || []).includes(bankType));
    const secondary = bankType === 'RANDOM' ? [] : sameSub.filter(q => !(q.bankTypes || []).includes(bankType));
    let picked = sampleUnique(primary, Math.min(row.count, primary.length));
    if (picked.length < row.count) picked = picked.concat(sampleUnique(excludeQuestions(secondary, picked), row.count - picked.length));
    if (picked.length < row.count) picked = picked.concat(sampleUnique(excludeQuestions(sameSubject, picked), row.count - picked.length));
    if (picked.length < row.count) picked = picked.concat(sampleWithReplacement(sameSub.length ? sameSub : sameSubject.length ? sameSubject : active, row.count - picked.length));
    return picked.slice(0, row.count);
  }

  function moveMock(delta) {
    const s = ui.session;
    if (!s || s.kind !== 'mock') return;
    commitMockQuestionTime(s);
    s.index = clamp(s.index + delta, 0, s.questionIds.length - 1);
    s.questionEnteredAt = Date.now();
    s.hintVisible = false;
    render();
  }

  function jumpMock(index) {
    const s = ui.session;
    if (!s || s.kind !== 'mock') return;
    commitMockQuestionTime(s);
    s.index = clamp(index, 0, s.questionIds.length - 1);
    s.questionEnteredAt = Date.now();
    s.hintVisible = false;
    render();
  }

  function finishMockExam(timeUp = false) {
    const s = ui.session;
    if (!s || s.kind !== 'mock' || s.finished) return;
    if (!timeUp && !confirm('모의고사를 제출할까요? 미응답 문항은 오답으로 처리됩니다.')) return;
    commitMockQuestionTime(s);
    s.finished = true;
    const elapsedSeconds = Math.max(1, getMockElapsedSeconds(s));
    const fallbackAvg = Math.max(1, Math.round(elapsedSeconds / Math.max(1, s.questionIds.length)));
    const perQuestionTimes = Array.isArray(s.timeSpentSeconds)
      ? s.timeSpentSeconds.map(sec => Math.max(0, Math.round(Number(sec || 0))))
      : Array(s.questionIds.length).fill(fallbackAvg);
    const records = s.questionIds.map((qid, i) => {
      const q = getQuestion(qid);
      const selected = s.answers[i];
      const itemElapsed = Math.max(1, perQuestionTimes[i] || fallbackAvg);
      return createAttempt(q, selected, itemElapsed, 'mock', selected === null || selected === undefined ? '미응답' : '');
    });
    records.forEach(record => {
      state.attempts.push(record);
      updateReviewQueue(record);
    });
    const summary = summarizeRecords(records);
    const result = {
      id: `m${Date.now()}`,
      bankType: s.bankType,
      takenAt: nowIso(),
      elapsedSeconds,
      timeUp,
      answered: records.filter(r => r.selectedAnswer !== null && r.selectedAnswer !== undefined).length,
      total: summary.total,
      correct: summary.correct,
      rate: summary.rate,
      avgTime: summary.avgTime,
      passBySubject: summary.passBySubject,
      subjects: summary.subjects,
      weakTopics: summarizeWeakFromRecords(records, 5),
      items: records.map((record, i) => {
        const q = getQuestion(record.questionId);
        return {
          number: i + 1,
          questionId: record.questionId,
          selectedAnswer: record.selectedAnswer,
          correctAnswer: record.correctAnswer,
          isCorrect: record.isCorrect,
          elapsedSeconds: record.elapsedSeconds,
          subject: q?.subject || '',
          subSubject: q?.subSubject || '',
          topic: q?.topic || '',
          pattern: q?.pattern || ''
        };
      })
    };
    state.mockResults.push(result);
    saveState();
    ui.session = { kind: 'mockResult', result };
    render();
  }

  function createAttempt(q, selectedAnswer, elapsedSeconds, mode, reason = '') {
    const isAnswered = selectedAnswer !== null && selectedAnswer !== undefined;
    const isCorrect = isAnswered && selectedAnswer === q.answer;
    return {
      id: `a${Date.now()}${Math.random().toString(16).slice(2)}`,
      questionId: q.id,
      selectedAnswer: isAnswered ? selectedAnswer : null,
      correctAnswer: q.answer,
      isCorrect,
      elapsedSeconds,
      mistakeReason: isCorrect ? '' : (reason || '미선택'),
      attemptedAt: nowIso(),
      mode
    };
  }

  function recordMistakeReason(reason) {
    const s = ui.session;
    if (!s || s.kind !== 'practice') return;
    const last = s.records.at(-1);
    if (!last || last.isCorrect) return;
    last.mistakeReason = reason;
    const stored = state.attempts.find(a => a.id === last.id);
    if (stored) stored.mistakeReason = reason;
    saveState();
    toast(`오답 사유: ${reason}`);
  }

  function quitSession() {
    if (ui.session?.kind === 'mock') {
      if (!confirm('진행 중인 모의고사를 중단할까요? 결과는 저장되지 않습니다.')) return;
    }
    ui.session = null;
    render();
  }

  function commitMockQuestionTime(session = ui.session) {
    const s = session;
    if (!s || s.kind !== 'mock' || s.finished || s.paused) return;
    if (!Array.isArray(s.timeSpentSeconds)) s.timeSpentSeconds = Array(s.questionIds.length).fill(0);
    const now = Date.now();
    const enteredAt = s.questionEnteredAt || now;
    const deltaSeconds = Math.max(0, (now - enteredAt) / 1000);
    if (deltaSeconds > 0) {
      s.timeSpentSeconds[s.index] = Math.max(0, Number(s.timeSpentSeconds[s.index] || 0)) + deltaSeconds;
      s.questionEnteredAt = now;
    }
  }

  function tickTimers() {
    tickStandaloneTimer();
    tickMockTimer();
    updateHeaderTimerDom();
  }

  function toggleAppTimer() {
    if (ui.session?.kind === 'mock') {
      toggleMockTimerPause();
    } else {
      toggleStandaloneTimer();
    }
    updateHeaderTimerDom();
  }

  function resetAppTimer() {
    if (ui.session?.kind === 'mock') {
      const s = ui.session;
      if (!confirm('모의고사 타이머를 처음 시간으로 초기화할까요? 현재 답안은 유지되고 타이머는 일시정지 상태가 됩니다.')) return;
      s.startedAt = Date.now();
      s.totalPausedMs = 0;
      s.paused = true;
      s.pausedAt = Date.now();
      s.timeSpentSeconds = Array(s.questionIds.length).fill(0);
      s.questionEnteredAt = Date.now();
      toast('모의고사 타이머를 초기화했습니다. 상단 타이머를 누르면 재개됩니다.');
      render();
      return;
    }
    ui.timer.limitSeconds = 120 * 60;
    ui.timer.remainingSeconds = ui.timer.limitSeconds;
    ui.timer.running = false;
    ui.timer.lastTickAt = null;
    updateHeaderTimerDom();
    toast('120분 타이머를 초기화했습니다.');
  }

  function toggleStandaloneTimer() {
    const timer = ui.timer;
    if (!Number.isFinite(timer.remainingSeconds) || timer.remainingSeconds <= 0) {
      timer.remainingSeconds = timer.limitSeconds;
    }
    if (timer.running) {
      tickStandaloneTimer();
      timer.running = false;
      timer.lastTickAt = null;
      toast('120분 타이머를 일시정지했습니다.');
      return;
    }
    timer.running = true;
    timer.lastTickAt = Date.now();
    toast('120분 타이머를 시작했습니다.');
  }

  function tickStandaloneTimer() {
    if (ui.session?.kind === 'mock') return;
    const timer = ui.timer;
    if (!timer.running) return;
    const now = Date.now();
    if (!timer.lastTickAt) timer.lastTickAt = now;
    const delta = Math.floor((now - timer.lastTickAt) / 1000);
    if (delta <= 0) return;
    timer.remainingSeconds = Math.max(0, timer.remainingSeconds - delta);
    timer.lastTickAt += delta * 1000;
    if (timer.remainingSeconds <= 0) {
      timer.running = false;
      timer.lastTickAt = null;
      toast('120분 타이머가 종료되었습니다.');
    }
  }

  function toggleMockTimerPause() {
    const s = ui.session;
    if (!s || s.kind !== 'mock' || s.finished) return;
    if (getMockRemainingSeconds() <= 0) return;
    if (s.paused) {
      s.totalPausedMs = (s.totalPausedMs || 0) + Math.max(0, Date.now() - (s.pausedAt || Date.now()));
      s.paused = false;
      s.pausedAt = null;
      s.questionEnteredAt = Date.now();
      toast('모의고사 타이머를 재개했습니다.');
    } else {
      commitMockQuestionTime(s);
      s.paused = true;
      s.pausedAt = Date.now();
      toast('모의고사 타이머를 일시정지했습니다.');
    }
    render();
  }

  function tickMockTimer() {
    if (!ui.session || ui.session.kind !== 'mock') return;
    updateTimerDom();
    if (ui.session.paused) return;
    const remaining = getMockRemainingSeconds();
    if (remaining <= 0) finishMockExam(true);
  }

  function getMockElapsedSeconds(session = ui.session) {
    const s = session;
    if (!s || s.kind !== 'mock') return 0;
    const end = s.paused ? (s.pausedAt || Date.now()) : Date.now();
    return Math.max(0, Math.floor((end - s.startedAt - (s.totalPausedMs || 0)) / 1000));
  }

  function getMockRemainingSeconds() {
    const s = ui.session;
    if (!s || s.kind !== 'mock') return 0;
    return Math.max(0, s.limitSeconds - getMockElapsedSeconds(s));
  }

  function getMockRemainingPercent() {
    const s = ui.session;
    if (!s || s.kind !== 'mock') return 0;
    return Math.round((getMockRemainingSeconds() / s.limitSeconds) * 100);
  }

  function getHeaderTimerLimitSeconds() {
    return ui.session?.kind === 'mock' ? ui.session.limitSeconds : ui.timer.limitSeconds;
  }

  function getHeaderTimerRemainingSeconds() {
    return ui.session?.kind === 'mock' ? getMockRemainingSeconds() : ui.timer.remainingSeconds;
  }

  function isHeaderTimerRunning() {
    if (ui.session?.kind === 'mock') return !ui.session.paused && getMockRemainingSeconds() > 0;
    return !!ui.timer.running;
  }

  function updateHeaderTimerDom() {
    const btn = document.getElementById('appTimerToggle');
    if (!btn) return;
    const remaining = getHeaderTimerRemainingSeconds();
    const limit = getHeaderTimerLimitSeconds();
    const running = isHeaderTimerRunning();
    const paused = !running && remaining < limit && remaining > 0;
    const icon = running ? '⏸' : paused ? '▶' : '⏱';
    btn.textContent = `${icon} ${formatExamClock(remaining)}`;
    btn.classList.toggle('timer-running', running);
    btn.classList.toggle('timer-paused', paused);
    btn.setAttribute('aria-label', running ? '타이머 일시정지' : '타이머 시작 또는 재개');
    btn.title = running ? '클릭하면 타이머가 일시정지됩니다.' : `클릭하면 ${paused ? '타이머가 재개됩니다.' : '120분 타이머가 시작됩니다.'}`;
    const resetBtn = document.getElementById('appTimerReset');
    if (resetBtn) resetBtn.title = ui.session?.kind === 'mock' ? '모의고사 타이머를 초기화합니다.' : '120분 타이머를 초기화합니다.';
  }

  function updateTimerDom() {
    const s = ui.session;
    if (!s || s.kind !== 'mock') return;
    const remaining = getMockRemainingSeconds();
    const timer = document.getElementById('mockTimer');
    const bar = document.getElementById('mockTimerBar');
    if (timer) timer.textContent = formatExamClock(remaining);
    if (bar) bar.style.setProperty('--w', `${getMockRemainingPercent()}%`);
  }

  function saveSettings() {
    state.settings.examDate = val('examDate');
    state.settings.dailyGoalQuestions = clamp(Number(val('dailyGoalQuestions') || 20), 5, 200);
    state.settings.mockMinutes = clamp(Number(val('mockMinutes') || 120), 10, 240);
    state.settings.lawEthicsExempt = !!document.getElementById('lawEthicsExempt')?.checked;
    state.settings.theme = val('themeMode') || 'light';
    saveState();
    applyTheme();
    toast('설정을 저장했습니다.');
    renderSettings();
  }

  function toggleTheme() {
    state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
    saveState();
    applyTheme();
  }

  function applyTheme() {
    const theme = state?.settings?.theme === 'dark' ? 'dark' : 'light';
    document.documentElement.dataset.theme = theme;
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = theme === 'dark' ? '라이트' : '다크';
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', theme === 'dark' ? '#0b1220' : '#f5f7fb');
    updateHeaderTimerDom();
  }

  function updateReviewQueue(attempt) {
    const q = getQuestion(attempt.questionId);
    if (!q) return;
    const item = state.reviewQueue.find(x => x.questionId === attempt.questionId);
    const slow = attempt.isCorrect && attempt.elapsedSeconds >= 90 && attempt.mode !== 'mock';
    if (!attempt.isCorrect) {
      if (!item) {
        state.reviewQueue.push({ questionId: attempt.questionId, reviewStage: 1, nextReviewAt: addDays(attempt.mode === 'mock' ? 1 : 1), streakCorrect: 0, streakWrong: 1, masteryScore: 0, mastered: false, updatedAt: nowIso() });
      } else {
        item.reviewStage = Math.min(4, (item.reviewStage || 1) + 1);
        item.nextReviewAt = item.streakWrong >= 1 ? todayStr() : addDays(1);
        item.streakCorrect = 0;
        item.streakWrong = (item.streakWrong || 0) + 1;
        item.masteryScore = Math.max(0, (item.masteryScore || 0) - 25);
        item.mastered = false;
        item.updatedAt = nowIso();
      }
      return;
    }
    if (item) {
      item.streakCorrect = (item.streakCorrect || 0) + 1;
      item.streakWrong = 0;
      item.masteryScore = Math.min(100, (item.masteryScore || 0) + 35);
      item.nextReviewAt = item.streakCorrect >= 2 ? addDays(7) : addDays(3);
      item.mastered = item.streakCorrect >= 3;
      item.updatedAt = nowIso();
    } else if (slow) {
      state.reviewQueue.push({ questionId: attempt.questionId, reviewStage: 1, nextReviewAt: addDays(3), streakCorrect: 1, streakWrong: 0, masteryScore: 35, mastered: false, updatedAt: nowIso() });
    }
  }

  function summarizeRecords(records) {
    const total = records.length;
    const correct = records.filter(r => r.isCorrect).length;
    const rate = total ? Math.round((correct / total) * 100) : 0;
    const avgTime = total ? Math.round(records.reduce((sum, r) => sum + (r.elapsedSeconds || 0), 0) / total) : 0;
    const subjectMap = new Map();
    records.forEach(record => {
      const q = getQuestion(record.questionId);
      if (!q) return;
      const key = q.subject;
      if (!subjectMap.has(key)) subjectMap.set(key, { subject: key, total: 0, correct: 0, rate: 0, pass40: false });
      const row = subjectMap.get(key);
      row.total += 1;
      if (record.isCorrect) row.correct += 1;
    });
    const subjects = [...subjectMap.values()].map(row => ({ ...row, rate: row.total ? Math.round((row.correct / row.total) * 100) : 0, pass40: row.total ? (row.correct / row.total) >= 0.4 : false }));
    return { total, correct, rate, avgTime, subjects, passBySubject: subjects.every(s => s.pass40) };
  }

  function summarizeWeakFromRecords(records, limit = 5) {
    const map = new Map();
    records.forEach(record => {
      if (record.isCorrect) return;
      const q = getQuestion(record.questionId);
      if (!q) return;
      const key = `${q.subject}|${q.subSubject}|${q.topic}`;
      if (!map.has(key)) map.set(key, { subject: q.subject, subSubject: q.subSubject, topic: q.topic, wrong: 0 });
      map.get(key).wrong += 1;
    });
    return [...map.values()].sort((a, b) => b.wrong - a.wrong).slice(0, limit);
  }

  function renderSubjectResultTable(subjects) {
    if (!subjects?.length) return '<p class="note">과목별 결과가 없습니다.</p>';
    return `<table class="table"><thead><tr><th>과목</th><th>점수</th><th>판정</th></tr></thead><tbody>${subjects.map(s => `<tr><td>${esc(s.subject)}</td><td>${s.correct}/${s.total} (${s.rate}%)</td><td>${s.pass40 ? '40% 통과' : '과락 위험'}</td></tr>`).join('')}</tbody></table>`;
  }

  function renderMockSummary(result) {
    return `<div class="item"><div class="row wrap"><div class="item-title">${esc(getBank(result.bankType).label)} · ${result.correct}/${result.total} · ${result.rate}%</div><span class="chip ${result.rate >= 70 && result.passBySubject ? 'green' : 'red'}">${result.rate >= 70 && result.passBySubject ? '합격권' : '불합격권'}</span></div><div class="item-meta">${formatDateTime(result.takenAt)} · ${formatSeconds(result.elapsedSeconds || 0)} · 과목별 40% ${result.passBySubject ? '충족' : '미달'}</div></div>`;
  }

  function computeStats() {
    const attempts = state.attempts || [];
    const correctCount = attempts.filter(a => a.isCorrect).length;
    const correctRate = attempts.length ? Math.round((correctCount / attempts.length) * 100) : 0;
    const todayAttempts = attempts.filter(a => a.attemptedAt?.slice(0, 10) === todayStr()).length;
    return { correctCount, correctRate, todayAttempts, needFor70: Math.max(0, Math.ceil((0.7 * Math.max(attempts.length, 100)) - correctCount)) };
  }

  function getWeakTopics(limit = 5) {
    const map = new Map();
    (state.attempts || []).slice(-500).forEach(attempt => {
      const q = getQuestion(attempt.questionId);
      if (!q) return;
      const key = `${q.subject}|${q.subSubject}|${q.topic}`;
      if (!map.has(key)) map.set(key, { subject: q.subject, subSubject: q.subSubject, topic: q.topic, total: 0, wrong: 0, rate: 0 });
      const row = map.get(key);
      row.total += 1;
      if (!attempt.isCorrect) row.wrong += 1;
    });
    return [...map.values()].filter(row => row.total >= 1 && row.wrong > 0).map(row => ({ ...row, rate: Math.round(((row.total - row.wrong) / row.total) * 100) })).sort((a, b) => b.wrong - a.wrong || a.rate - b.rate).slice(0, limit);
  }

  function getActiveQuestions() {
    return (state.questions || []).filter(q => !(state.settings.lawEthicsExempt && q.subject.includes('법규')));
  }

  function getDueReviewItems() {
    return (state.reviewQueue || []).filter(item => !item.mastered && isDue(item.nextReviewAt) && getQuestion(item.questionId));
  }

  function getQuestion(id) {
    return (state.questions || []).find(q => q.id === id) || DEFAULT_QUESTIONS.find(q => q.id === id);
  }

  function getBank(id) {
    return BANK_TYPES.find(b => b.id === id) || BANK_TYPES[0];
  }

  function getBankStats() {
    const byBank = {};
    let seededTotal = 0;
    (state.questions || []).forEach(q => {
      (q.bankTypes || []).forEach(b => {
        if (/^[A-H]$/.test(b)) {
          byBank[b] = (byBank[b] || 0) + 1;
          if (/^seed-v[45]-/.test(q.id || '')) seededTotal += 1;
        }
      });
    });
    return { byBank, seededTotal };
  }

  function exportJson() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    downloadBlob(blob, `fta-study-backup-${todayStr()}.json`);
  }

  async function importJson(file) {
    if (!file) return;
    try {
      const text = await file.text();
      const imported = JSON.parse(text);
      state = migrateState(imported);
      saveState();
      applyTheme();
      toast('백업을 복원했습니다.');
      render();
    } catch (err) {
      console.error(err);
      toast('복원 실패: JSON 백업 파일을 확인하세요.');
    }
  }

  function clearAttempts() {
    if (!confirm('풀이 기록과 오답노트만 초기화할까요? 문제은행은 유지됩니다.')) return;
    state.attempts = [];
    state.reviewQueue = [];
    state.mockResults = [];
    saveState();
    ui.session = null;
    toast('풀이 기록을 초기화했습니다.');
    renderSettings();
  }

  function resetAll() {
    if (!confirm('전체 데이터를 초기화할까요? 설정, 오답, 풀이 기록이 모두 초기 상태로 돌아갑니다.')) return;
    localStorage.removeItem(STORAGE_KEY);
    state = createInitialState();
    saveState();
    ui.session = null;
    applyTheme();
    toast('전체 데이터를 초기화했습니다.');
    render();
  }

  function loadBankAgain() {
    const map = new Map((state.questions || []).map(q => [q.id, q]));
    DEFAULT_QUESTIONS.forEach(q => { if (!map.has(q.id)) map.set(q.id, normalizeQuestion(q)); });
    state.questions = [...map.values()];
    state.patterns = buildPatterns(state.questions);
    saveState();
    toast('A~H 기본 문제은행을 보강했습니다.');
    renderSettings();
  }

  function createInitialState() {
    const questions = structuredCloneSafe(DEFAULT_QUESTIONS).map(normalizeQuestion);
    return {
      version: APP_VERSION,
      settings: { examDate: '', dailyGoalQuestions: 20, lawEthicsExempt: false, theme: 'light', mockMinutes: 120 },
      sources: [
        { id: 's1', title: '금융투자분석사 공식 시험구조', sourceType: 'official_info', reliability: 'A', usagePolicy: '과목·문항수·합격기준 반영' },
        { id: 's2', title: 'A~H 기출유형 변형 문제은행', sourceType: 'generated_pattern_bank', reliability: 'B', usagePolicy: '개인 학습용 변형 문항' }
      ],
      patterns: buildPatterns(questions),
      questions,
      attempts: [],
      reviewQueue: [],
      mockResults: [],
      createdAt: nowIso(),
      updatedAt: nowIso()
    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return createInitialState();
      return migrateState(JSON.parse(raw));
    } catch (err) {
      console.error(err);
      return createInitialState();
    }
  }

  function migrateState(input) {
    const base = createInitialState();
    const userQuestions = Array.isArray(input.questions) ? input.questions.map(normalizeQuestion) : [];
    const map = new Map();
    userQuestions.forEach(q => map.set(q.id, q));
    base.questions.forEach(q => { if (!map.has(q.id)) map.set(q.id, q); });
    const questions = [...map.values()].map(normalizeQuestion);
    return {
      ...base,
      ...input,
      version: APP_VERSION,
      settings: { ...base.settings, ...(input.settings || {}) },
      questions,
      patterns: buildPatterns(questions),
      attempts: Array.isArray(input.attempts) ? input.attempts : [],
      reviewQueue: Array.isArray(input.reviewQueue) ? input.reviewQueue : [],
      mockResults: Array.isArray(input.mockResults) ? input.mockResults : []
    };
  }

  function normalizeQuestion(question) {
    const subject = question.subject || '미분류';
    const subSubject = question.subSubject || question.sub_subject || '미분류';
    const topic = question.topic || '미분류';
    const pattern = question.pattern || question.patternName || topic;
    const bankTypes = Array.isArray(question.bankTypes) ? question.bankTypes : inferBankTypes(question);
    return {
      id: question.id || makeId('q'),
      bankTypes,
      bankLabel: question.bankLabel || (bankTypes[0] ? `${bankTypes[0]}형` : '개인'),
      subject,
      subSubject,
      topic,
      pattern,
      priority: question.priority || 'B',
      questionType: question.questionType || question.question_type || inferQuestionType(question.questionText || question.stem || '', topic),
      difficulty: question.difficulty || '중',
      questionText: question.questionText || question.stem || '',
      choices: Array.isArray(question.choices) ? question.choices.slice(0, 4) : [question.choice_1, question.choice_2, question.choice_3, question.choice_4].filter(Boolean).slice(0, 4),
      answer: normalizeAnswer(question.answer),
      explanation: question.explanation || '',
      sourceKind: question.sourceKind || question.source_kind || '기출유형 변형',
      sourceNote: question.sourceNote || question.source_note || '',
      isOriginalText: question.isOriginalText ?? question.is_original_text ?? false,
      createdAt: question.createdAt || question.created_at || nowIso(),
      updatedAt: question.updatedAt || question.updated_at || nowIso()
    };
  }

  function inferBankTypes(question) {
    const text = `${question.subject || ''} ${question.subSubject || ''} ${question.topic || ''} ${question.questionType || ''}`;
    if (/법규|윤리|회사법|자본시장법|금융위원회/.test(text)) return ['E'];
    if (/채권|파생|옵션|선물|ELS|ELW|듀레이션/.test(text)) return ['C'];
    if (/재무|WACC|DCF|ROE|FCFF|기업가치/.test(text)) return ['D'];
    if (/계산|CAPM|PER|PBR|NPV|IRR/.test(text)) return ['B'];
    return ['G'];
  }

  function buildPatterns(questions) {
    const map = new Map();
    questions.forEach(q => {
      const key = `${q.subject}|${q.subSubject}|${q.topic}|${q.pattern}`;
      if (!map.has(key)) map.set(key, { id: `p-${map.size + 1}`, subject: q.subject, subSubject: q.subSubject, topic: q.topic, pattern: q.pattern, priority: q.priority, sourceNote: 'A~H 문제은행 기반 태그' });
    });
    return [...map.values()];
  }

  function normalizeAnswer(answer) {
    if (typeof answer === 'number') {
      if (answer >= 0 && answer <= 3) return answer;
      if (answer >= 1 && answer <= 4) return answer - 1;
    }
    return answerToIndex(String(answer || '1'));
  }

  function answerToIndex(raw) {
    const normalized = String(raw ?? '1').trim().replace(/[번\s\.\)\(（）：:]/g, '').slice(0, 1);
    const map = { '1': 0, '①': 0, '가': 0, 'A': 0, 'a': 0, '2': 1, '②': 1, '나': 1, 'B': 1, 'b': 1, '3': 2, '③': 2, '다': 2, 'C': 2, 'c': 2, '4': 3, '④': 3, '라': 3, 'D': 3, 'd': 3 };
    return map[normalized] ?? 0;
  }

  function inferQuestionType(text, topic) {
    const source = `${text} ${topic}`;
    if (/[0-9]%|계산|WACC|CAPM|PER|PBR|듀레이션|ROE|NPV|IRR|PV|FCFF|가격변동률|베이시스/.test(source)) return 'calculation';
    if (/법|규정|윤리|투자권유|미공개|시세조종/.test(source)) return 'law_concept';
    return 'concept';
  }

  function sampleUniqueOrRepeat(pool, count) {
    if (!pool.length) return [];
    const unique = sampleUnique(pool, Math.min(count, pool.length));
    if (unique.length >= count) return unique;
    return unique.concat(sampleWithReplacement(pool, count - unique.length));
  }

  function sampleUnique(pool, count) {
    const arr = [...pool];
    shuffleInPlace(arr);
    return arr.slice(0, count);
  }

  function sampleWithReplacement(pool, count) {
    if (!pool.length) return [];
    const out = [];
    for (let i = 0; i < count; i += 1) out.push(pool[Math.floor(Math.random() * pool.length)]);
    return out;
  }

  function excludeQuestions(pool, picked) {
    const ids = new Set(picked.map(q => q.id));
    return pool.filter(q => !ids.has(q.id));
  }

  function shuffleInPlace(arr) {
    for (let i = arr.length - 1; i > 0; i -= 1) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function saveState() {
    state.updatedAt = nowIso();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function setView(html) { document.getElementById('view').innerHTML = html; }
  function val(id) { return document.getElementById(id)?.value?.trim() || ''; }
  function esc(value) { return String(value ?? '').replace(/[&<>"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch])); }
  function escAttr(value) { return esc(value).replace(/'/g, '&#39;'); }
  function unique(arr) { return [...new Set(arr.filter(Boolean))]; }
  function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
  function nowIso() { return new Date().toISOString(); }
  function todayStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function addDays(days) { const d = new Date(); d.setDate(d.getDate() + days); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function isDue(dateStr) { return !dateStr || dateStr <= todayStr(); }
  function makeId(prefix) { return `${prefix}${Date.now()}${Math.random().toString(16).slice(2, 8)}`; }
  function structuredCloneSafe(value) { return JSON.parse(JSON.stringify(value)); }
  function formatDateTime(iso) { if (!iso) return ''; const d = new Date(iso); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
  function formatSeconds(total) { total = Math.max(0, Math.floor(total || 0)); const h = Math.floor(total / 3600); const m = Math.floor((total % 3600) / 60); const s = total % 60; return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`; }
  function formatExamClock(total) { total = Math.max(0, Math.floor(total || 0)); const m = Math.floor(total / 60); const s = total % 60; return `${m}:${String(s).padStart(2,'0')}`; }

  function getDdayLabel(dateStr) {
    if (!dateStr) return { label: '시험일 미설정', title: '시험일을 설정하세요', badge: 'D-?', days: 9999 };
    const today = new Date(todayStr());
    const exam = new Date(dateStr);
    const days = Math.ceil((exam - today) / 86400000);
    if (days > 0) return { label: `D-${days}`, title: '금융투자분석사 준비 중', badge: `남은 ${days}일`, days };
    if (days === 0) return { label: 'D-Day', title: '시험 당일입니다', badge: '오늘', days };
    return { label: `D+${Math.abs(days)}`, title: '시험일이 지났습니다', badge: '종료', days };
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function toast(message) {
    const el = document.getElementById('toast');
    el.textContent = message;
    el.classList.remove('hidden');
    clearTimeout(ui.toastTimer);
    ui.toastTimer = setTimeout(() => el.classList.add('hidden'), 2200);
  }

  function registerServiceWorker() {
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      navigator.serviceWorker.register('./service-worker.js').catch(console.warn);
    }
  }
})();

  </script>
